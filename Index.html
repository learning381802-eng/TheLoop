<!DOCTYPE html>
<html>
<head>
  <title>The Loop - Discord-like Chat</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary: #5865f2;
      --secondary: #4752c4;
      --background: #36393f;
      --surface: #2f3136;
      --surface-secondary: #202225;
      --text-primary: #dcddde;
      --text-secondary: #b9bbbe;
      --border: #202225;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      background: var(--background);
      color: var(--text-primary);
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* Server List Sidebar */
    .server-sidebar {
      width: 72px;
      background: var(--surface-secondary);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 12px 0;
      gap: 12px;
      border-right: 1px solid var(--border);
      overflow-y: auto;
    }

    .server-icon {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: var(--primary);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 20px;
    }

    .server-icon:hover {
      border-radius: 30%;
      transform: scale(1.1);
    }

    .server-icon.active {
      background: var(--primary);
      border-radius: 30%;
    }

    .server-add {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: var(--surface);
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 24px;
      transition: all 0.2s;
      border: 2px dashed var(--primary);
    }

    .server-add:hover {
      color: var(--primary);
      background: var(--primary);
      color: white;
    }

    /* Channel Sidebar */
    .channel-sidebar {
      width: 240px;
      background: var(--surface);
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border);
    }

    .channel-header {
      padding: 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .channel-header-title {
      font-weight: 600;
      font-size: 14px;
      color: var(--text-primary);
    }

    .channel-header-actions {
      display: flex;
      gap: 8px;
    }

    .icon-btn {
      width: 32px;
      height: 32px;
      border: none;
      background: transparent;
      color: var(--text-secondary);
      cursor: pointer;
      border-radius: 4px;
      transition: background 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    .icon-btn:hover {
      background: var(--background);
      color: var(--text-primary);
    }

    .channel-list {
      flex-grow: 1;
      overflow-y: auto;
      padding: 8px 0;
    }

    .channel-item {
      padding: 8px 16px;
      margin: 0 8px;
      cursor: pointer;
      transition: background 0.2s;
      border-radius: 4px;
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text-secondary);
      font-size: 13px;
    }

    .channel-item:hover {
      background: var(--background);
      color: var(--text-primary);
    }

    .channel-item.active {
      background: var(--background);
      color: var(--primary);
    }

    .channel-icon {
      width: 20px;
      height: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Main Chat Area */
    .main-container {
      flex-grow: 1;
      display: flex;
      flex-direction: column;
      background: var(--background);
    }

    .chat-header {
      padding: 12px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 48px;
    }

    .chat-header-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .chat-icon {
      font-size: 20px;
    }

    .chat-title {
      font-weight: 600;
      font-size: 15px;
    }

    .chat-header-right {
      display: flex;
      gap: 8px;
    }

    /* Messages Area */
    #messages {
      flex-grow: 1;
      overflow-y: auto;
      padding: 16px 24px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .message {
      display: flex;
      gap: 16px;
      padding: 2px 0;
      margin-bottom: 4px;
      animation: slideIn 0.2s ease-in;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(5px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .message:hover {
      background: var(--surface-secondary);
      padding: 2px 4px;
      border-radius: 4px;
    }

    .message-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--primary);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 500;
      flex-shrink: 0;
      cursor: pointer;
      font-size: 14px;
    }

    .message-content {
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 0;
      flex-grow: 1;
    }

    .message-header {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .message-author {
      font-weight: 500;
      font-size: 13px;
      cursor: pointer;
      color: var(--text-primary);
    }

    .message-author:hover {
      text-decoration: underline;
    }

    .message-time {
      font-size: 11px;
      color: var(--text-secondary);
    }

    .message-text {
      font-size: 13px;
      line-height: 1.5;
      word-wrap: break-word;
      white-space: pre-wrap;
    }

    .message-image {
      max-width: 400px;
      border-radius: 8px;
      margin-top: 8px;
      cursor: pointer;
    }

    .message-reactions {
      display: flex;
      gap: 6px;
      margin-top: 8px;
      flex-wrap: wrap;
    }

    .reaction {
      background: var(--surface-secondary);
      border: 1px solid var(--border);
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 12px;
      cursor: pointer;
      transition: background 0.2s;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .reaction:hover {
      background: var(--surface);
    }

    .reaction-count {
      font-size: 11px;
      color: var(--text-secondary);
    }

    .message-actions {
      display: none;
      gap: 4px;
      margin-left: auto;
    }

    .message:hover .message-actions {
      display: flex;
    }

    .action-btn {
      width: 24px;
      height: 24px;
      border: none;
      background: var(--surface-secondary);
      color: var(--text-secondary);
      cursor: pointer;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      transition: background 0.2s, color 0.2s;
    }

    .action-btn:hover {
      background: var(--primary);
      color: white;
    }

    .message-edited {
      font-size: 11px;
      color: var(--text-secondary);
      margin-left: 4px;
    }

    .typing-indicator {
      font-size: 12px;
      color: var(--text-secondary);
      padding: 8px 0;
    }

    .typing-dot {
      display: inline-block;
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: var(--text-secondary);
      margin: 0 2px;
      animation: typing 1.4s infinite;
    }

    .typing-dot:nth-child(2) {
      animation-delay: 0.2s;
    }

    .typing-dot:nth-child(3) {
      animation-delay: 0.4s;
    }

    @keyframes typing {
      0%, 60%, 100% { opacity: 0.5; }
      30% { opacity: 1; }
    }

    /* Input Area */
    .input-area {
      padding: 16px 24px;
      border-top: 1px solid var(--border);
    }

    .input-wrapper {
      display: flex;
      gap: 8px;
      align-items: flex-end;
      background: var(--surface-secondary);
      border-radius: 8px;
      padding: 12px 16px;
    }

    #messageInput {
      flex-grow: 1;
      border: none;
      outline: none;
      background: transparent;
      color: var(--text-primary);
      font-size: 13px;
      resize: none;
      max-height: 100px;
      font-family: inherit;
    }

    #messageInput::placeholder {
      color: var(--text-secondary);
    }

    .input-actions {
      display: flex;
      gap: 8px;
    }

    .input-action-btn {
      width: 24px;
      height: 24px;
      border: none;
      background: transparent;
      color: var(--primary);
      cursor: pointer;
      font-size: 16px;
      transition: opacity 0.2s;
    }

    .input-action-btn:hover {
      opacity: 0.8;
    }

    #imageInput, #fileInput {
      display: none;
    }

    /* Modals */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.6);
      z-index: 1000;
      justify-content: center;
      align-items: center;
    }

    .modal.active {
      display: flex;
    }

    .modal-content {
      background: var(--surface);
      border-radius: 8px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      max-width: 480px;
      width: 90%;
      max-height: 80vh;
      overflow-y: auto;
      border: 1px solid var(--border);
    }

    .modal-header {
      padding: 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .modal-header h2 {
      font-size: 18px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .close-btn {
      background: none;
      border: none;
      font-size: 24px;
      cursor: pointer;
      color: var(--text-secondary);
    }

    .modal-body {
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .form-group label {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-primary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .form-group input,
    .form-group textarea,
    .form-group select {
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: var(--background);
      color: var(--text-primary);
      font-size: 13px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }

    .form-group input:focus,
    .form-group textarea:focus,
    .form-group select:focus {
      border-color: var(--primary);
    }

    .form-group textarea {
      resize: vertical;
      min-height: 80px;
    }

    .modal-footer {
      padding: 16px 24px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 12px;
      justify-content: flex-end;
    }

    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      transition: all 0.2s;
    }

    .btn-primary {
      background: var(--primary);
      color: white;
    }

    .btn-primary:hover {
      background: var(--secondary);
    }

    .btn-secondary {
      background: transparent;
      color: var(--primary);
      border: 1px solid var(--primary);
    }

    .btn-secondary:hover {
      background: var(--primary);
      color: white;
    }

    /* User List */
    .user-select {
      max-height: 200px;
      overflow-y: auto;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: var(--background);
    }

    .user-select-item {
      padding: 12px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.2s;
    }

    .user-select-item:hover {
      background: var(--surface-secondary);
    }

    .user-select-item:last-child {
      border-bottom: none;
    }

    .user-select-item input[type="checkbox"] {
      cursor: pointer;
    }

    /* User Status */
    .status-badge {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      display: inline-block;
      margin-right: 4px;
    }

    .status-online {
      background: #43b581;
    }

    .status-idle {
      background: #faa61a;
    }

    .status-dnd {
      background: #f04747;
    }

    .status-offline {
      background: #747f8d;
    }

    /* Member List */
    .member-list {
      width: 200px;
      background: var(--surface);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      padding: 12px 0;
    }

    .member-list-header {
      padding: 8px 16px;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
    }

    .member-item {
      padding: 8px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      transition: background 0.2s;
      font-size: 13px;
    }

    .member-item:hover {
      background: var(--background);
    }

    .member-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--primary);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 500;
      font-size: 12px;
      flex-shrink: 0;
    }

    /* Empty State */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--text-secondary);
      gap: 16px;
    }

    .empty-state-icon {
      font-size: 48px;
      opacity: 0.5;
    }

    .empty-state-text {
      font-size: 16px;
      text-align: center;
    }

    @media (max-width: 768px) {
      .channel-sidebar,
      .member-list {
        display: none;
      }
    }
  </style>
</head>
<body>
  <!-- Login Modal -->
  <div class="modal active" id="loginModal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>🔄 The Loop</h2>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="loginEmail" placeholder="your.email@example.com" />
        </div>
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="loginUsername" placeholder="Your username" />
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-primary" onclick="handleLogin()">Join</button>
      </div>
    </div>
  </div>

  <!-- Create Server Modal -->
  <div class="modal" id="createServerModal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Create Server</h2>
        <button class="close-btn" onclick="closeModal('createServerModal')">✕</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>Server Name</label>
          <input type="text" id="serverName" placeholder="e.g., Project Team" />
        </div>
        <div class="form-group">
          <label>Server Icon</label>
          <input type="text" id="serverIcon" placeholder="Emoji or URL" value="🎮" />
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal('createServerModal')">Cancel</button>
        <button class="btn btn-primary" onclick="handleCreateServer()">Create</button>
      </div>
    </div>
  </div>

  <!-- Create Channel Modal -->
  <div class="modal" id="createChannelModal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Create Channel</h2>
        <button class="close-btn" onclick="closeModal('createChannelModal')">✕</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>Channel Type</label>
          <select id="channelType">
            <option value="text">Text Channel</option>
            <option value="voice">Voice Channel</option>
          </select>
        </div>
        <div class="form-group">
          <label>Channel Name</label>
          <input type="text" id="channelName" placeholder="e.g., #general" />
        </div>
        <div class="form-group">
          <label>Topic</label>
          <textarea id="channelTopic" placeholder="Channel topic/description"></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal('createChannelModal')">Cancel</button>
        <button class="btn btn-primary" onclick="handleCreateChannel()">Create</button>
      </div>
    </div>
  </div>

  <!-- Profile Modal -->
  <div class="modal" id="profileModal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>User Profile</h2>
        <button class="close-btn" onclick="closeModal('profileModal')">✕</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="profileUsername" />
        </div>
        <div class="form-group">
          <label>Bio</label>
          <textarea id="profileBio" placeholder="Tell us about yourself..."></textarea>
        </div>
        <div class="form-group">
          <label>Status</label>
          <select id="profileStatus">
            <option value="online">Online</option>
            <option value="idle">Idle</option>
            <option value="dnd">Do Not Disturb</option>
            <option value="offline">Offline</option>
          </select>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal('profileModal')">Cancel</button>
        <button class="btn btn-primary" onclick="handleUpdateProfile()">Save</button>
      </div>
    </div>
  </div>

  <!-- Main UI -->
  <div class="server-sidebar" id="serverSidebar">
    <div class="server-add" onclick="openModal('createServerModal')" title="Create Server">➕</div>
  </div>

  <div class="channel-sidebar">
    <div class="channel-header">
      <div class="channel-header-title" id="serverName">The Loop</div>
      <div class="channel-header-actions">
        <button class="icon-btn" onclick="openModal('createChannelModal')" title="Create Channel">➕</button>
        <button class="icon-btn" onclick="toggleMemberList()" title="Members">👥</button>
        <button class="icon-btn" onclick="openModal('profileModal')" title="Profile">⚙️</button>
      </div>
    </div>
    <div class="channel-list" id="channelList"></div>
  </div>

  <div class="main-container">
    <div class="chat-header" id="chatHeader">
      <div class="empty-state">
        <div class="empty-state-icon">💬</div>
        <div class="empty-state-text">Select a channel to start chatting</div>
      </div>
    </div>

    <ul id="messages"></ul>

    <div class="input-area" id="inputArea" style="display: none;">
      <div class="input-wrapper">
        <textarea id="messageInput" placeholder="Type a message..." rows="1"></textarea>
        <div class="input-actions">
          <button class="input-action-btn" onclick="triggerImageUpload()" title="Attach Image">🖼️</button>
          <button class="input-action-btn" onclick="triggerFileUpload()" title="Attach File">📎</button>
          <input type="file" id="imageInput" accept="image/*" onchange="handleImageUpload(event)">
          <input type="file" id="fileInput" onchange="handleFileUpload(event)">
        </div>
      </div>
      <button class="btn btn-primary" onclick="sendMessage()" id="sendBtn" disabled>Send</button>
    </div>
  </div>

  <div class="member-list" id="memberList" style="display: none;">
    <div class="member-list-header">Members</div>
    <div id="memberListContent"></div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();

    // Global State
    let currentUser = null;
    let servers = [];
    let currentServer = null;
    let channels = [];
    let currentChannel = null;
    let allUsers = [];
    let selectedImage = null;
    let selectedFile = null;
    let typingTimeout = null;
    let messageIdBeingEdited = null;

    // Socket Events
    socket.on('user_list', (userList) => {
      allUsers = userList;
      updateMemberList();
    });

    socket.on('server_created', (server) => {
      servers.push(server);
      renderServers();
      selectServer(server.id);
    });

    socket.on('channel_created', (channel) => {
      channels.push(channel);
      if (currentServer && channel.serverId === currentServer.id) {
        renderChannels();
      }
    });

    socket.on('new_message', (message) => {
      if (currentChannel && message.channelId === currentChannel.id) {
        displayMessage(message);
      }
    });

    socket.on('message_edited', (msg) => {
      if (currentChannel && msg.channelId === currentChannel.id) {
        const el = document.querySelector(`[data-message-id="${msg.id}"]`);
        if (el) {
          el.querySelector('.message-text').textContent = msg.text;
          const edited = el.querySelector('.message-edited');
          if (!edited) {
            const span = document.createElement('span');
            span.className = 'message-edited';
            span.textContent = '(edited)';
            el.querySelector('.message-header').appendChild(span);
          }
        }
      }
    });

    socket.on('message_deleted', (messageId) => {
      const el = document.querySelector(`[data-message-id="${messageId}"]`);
      if (el) el.remove();
    });

    socket.on('message_reacted', (msg) => {
      if (currentChannel && msg.channelId === currentChannel.id) {
        const el = document.querySelector(`[data-message-id="${msg.id}"]`);
        if (el) {
          renderReactions(el.querySelector('.message-reactions'), msg.reactions);
        }
      }
    });

    socket.on('user_typing', (data) => {
      if (currentChannel && data.channelId === currentChannel.id) {
        showTypingIndicator(data.username);
      }
    });

    socket.on('user_stop_typing', (data) => {
      if (currentChannel && data.channelId === currentChannel.id) {
        hideTypingIndicator();
      }
    });

    // UI Functions
    function handleLogin() {
      const email = document.getElementById('loginEmail').value.trim().toLowerCase();
      const username = document.getElementById('loginUsername').value.trim();

      if (!email || !validateEmail(email)) {
        alert('Please enter a valid email');
        return;
      }

      if (!username) {
        alert('Please enter a username');
        return;
      }

      currentUser = {
        userId: email.replace(/[^a-zA-Z0-9]/g, '_'),
        username,
        email
      };

      socket.emit('user_join', { email, username });
      closeModal('loginModal');
      loadServers();
    }

    function validateEmail(email) {
      return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
    }

    function openModal(modalId) {
      document.getElementById(modalId).classList.add('active');
    }

    function closeModal(modalId) {
      document.getElementById(modalId).classList.remove('active');
    }

    function handleCreateServer() {
      const name = document.getElementById('serverName').value.trim();
      const icon = document.getElementById('serverIcon').value.trim() || '🎮';

      if (!name) {
        alert('Please enter a server name');
        return;
      }

      socket.emit('create_server', { name, icon });
      document.getElementById('serverName').value = '';
      document.getElementById('serverIcon').value = '🎮';
      closeModal('createServerModal');
    }

    function handleCreateChannel() {
      const type = document.getElementById('channelType').value;
      const name = document.getElementById('channelName').value.trim();

      if (!name) {
        alert('Please enter a channel name');
        return;
      }

      socket.emit('create_channel', {
        serverId: currentServer.id,
        name,
        type
      });

      document.getElementById('channelName').value = '';
      closeModal('createChannelModal');
    }

    function handleUpdateProfile() {
      const username = document.getElementById('profileUsername').value.trim();
      const bio = document.getElementById('profileBio').value.trim();
      const status = document.getElementById('profileStatus').value;

      socket.emit('update_profile', { username, bio, status });
      socket.emit('set_status', status);
      closeModal('profileModal');
    }

    function loadServers() {
      fetch('/api/servers')
        .then(r => r.json())
        .then(data => {
          servers = data.filter(s => s.members.includes(currentUser.userId));
          renderServers();
        });
    }

    function renderServers() {
      const container = document.getElementById('serverSidebar');
      const serversHtml = servers.map(s => {
        const isActive = currentServer && s.id === currentServer.id;
        return `
          <div class="server-icon ${isActive ? 'active' : ''}" onclick="selectServer('${s.id}')" title="${escapeHtml(s.name)}">
            ${s.icon}
          </div>
        `;
      }).join('');
      container.innerHTML = serversHtml + '<div class="server-add" onclick="openModal(\'createServerModal\')" title="Create Server">➕</div>';
    }

    function selectServer(serverId) {
      currentServer = servers.find(s => s.id === serverId);
      if (!currentServer) return;

      document.getElementById('serverName').textContent = currentServer.name;
      currentChannel = null;
      selectedImage = null;
      messageIdBeingEdited = null;

      loadChannels();
      renderServers();
    }

    function loadChannels() {
      if (!currentServer) return;
      fetch(`/api/servers/${currentServer.id}/channels`)
        .then(r => r.json())
        .then(data => {
          channels = data;
          renderChannels();
          if (channels.length > 0) selectChannel(channels[0].id);
        });
    }

    function renderChannels() {
      const container = document.getElementById('channelList');
      container.innerHTML = channels.map(c => {
        const isActive = currentChannel && c.id === currentChannel.id;
        const icon = c.type === 'voice' ? '🔊' : '#';
        return `
          <div class="channel-item ${isActive ? 'active' : ''}" onclick="selectChannel('${c.id}')">
            <span class="channel-icon">${icon}</span>
            <span>${escapeHtml(c.name)}</span>
          </div>
        `;
      }).join('');
    }

    function selectChannel(channelId) {
      currentChannel = channels.find(c => c.id === channelId);
      if (!currentChannel) return;

      socket.emit('join_channel', channelId);
      
      const icon = currentChannel.type === 'voice' ? '🔊' : '#';
      document.getElementById('chatHeader').innerHTML = `
        <div class="chat-header-left">
          <div class="chat-icon">${icon}</div>
          <div class="chat-title">${escapeHtml(currentChannel.name)}</div>
        </div>
      `;

      document.getElementById('inputArea').style.display = 'flex';
      document.getElementById('messageInput').value = '';
      selectedImage = null;
      selectedFile = null;
      messageIdBeingEdited = null;

      renderChannels();
      loadMessages();
    }

    function loadMessages() {
      fetch(`/api/messages/${currentChannel.id}`)
        .then(r => r.json())
        .then(messages => {
          document.getElementById('messages').innerHTML = '';
          messages.forEach(msg => displayMessage(msg));
          scrollToBottom();
        });
    }

    function displayMessage(msg) {
      const container = document.getElementById('messages');
      const user = allUsers.find(u => u.userId === msg.userId);
      const initials = (user?.username || 'U').charAt(0).toUpperCase();
      const messageTime = new Date(msg.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

      const messageEl = document.createElement('li');
      messageEl.className = 'message';
      messageEl.setAttribute('data-message-id', msg.id);

      let reactionsHtml = '';
      if (Object.keys(msg.reactions).length > 0) {
        reactionsHtml = '<div class="message-reactions"></div>';
      }

      messageEl.innerHTML = `
        <div class="message-avatar">${initials}</div>
        <div class="message-content">
          <div class="message-header">
            <span class="message-author">${escapeHtml(msg.username)}</span>
            <span class="message-time">${messageTime}</span>
            ${msg.edited ? '<span class="message-edited">(edited)</span>' : ''}
          </div>
          <div class="message-text">${escapeHtml(msg.text)}</div>
          ${msg.image ? `<img src="${msg.image}" class="message-image" onclick="viewImage(this.src)">` : ''}
          ${reactionsHtml}
          <div class="message-actions">
            <button class="action-btn" onclick="addReaction('${msg.id}')" title="React">😊</button>
            ${msg.userId === currentUser.userId ? `
              <button class="action-btn" onclick="editMessage('${msg.id}', '${escapeHtml(msg.text).replace(/'/g, "&#39;")}')" title="Edit">✏️</button>
              <button class="action-btn" onclick="deleteMessage('${msg.id}')" title="Delete">🗑️</button>
            ` : ''}
          </div>
        </div>
      `;

      container.appendChild(messageEl);

      if (Object.keys(msg.reactions).length > 0) {
        renderReactions(messageEl.querySelector('.message-reactions'), msg.reactions);
      }

      scrollToBottom();
    }

    function renderReactions(container, reactions) {
      container.innerHTML = Object.entries(reactions).map(([emoji, users]) => `
        <div class="reaction" onclick="reactMessage('${emoji}')">
          ${emoji}
          <span class="reaction-count">${users.length}</span>
        </div>
      `).join('');
    }

    function sendMessage() {
      const text = document.getElementById('messageInput').value.trim();
      if (!text && !selectedImage && !selectedFile) return;

      socket.emit('send_message', {
        channelId: currentChannel.id,
        text,
        image: selectedImage
      });

      document.getElementById('messageInput').value = '';
      selectedImage = null;
      selectedFile = null;
      document.getElementById('sendBtn').disabled = true;

      socket.emit('stop_typing', { channelId: currentChannel.id });
    }

    function editMessage(messageId, text) {
      document.getElementById('messageInput').value = text;
      messageIdBeingEdited = messageId;
      document.getElementById('sendBtn').textContent = 'Save';
    }

    function deleteMessage(messageId) {
      if (confirm('Delete this message?')) {
        socket.emit('delete_message', {
          channelId: currentChannel.id,
          messageId
        });
      }
    }

    function addReaction(messageId) {
      const emoji = prompt('Enter emoji:');
      if (emoji) {
        reactMessage(emoji);
      }
    }

    function reactMessage(emoji) {
      socket.emit('react_message', {
        channelId: currentChannel.id,
        messageId: messageIdBeingEdited || currentChannel.lastMessageId,
        emoji
      });
    }

    function triggerImageUpload() {
      document.getElementById('imageInput').click();
    }

    function triggerFileUpload() {
      document.getElementById('fileInput').click();
    }

    function handleImageUpload(event) {
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (e) => {
        selectedImage = e.target.result;
        document.getElementById('messageInput').placeholder = '📷 Image selected...';
        document.getElementById('sendBtn').disabled = false;
      };
      reader.readAsDataURL(file);
    }

    function handleFileUpload(event) {
      const file = event.target.files[0];
      if (!file) return;
      selectedFile = file.name;
      document.getElementById('messageInput').placeholder = '📎 File selected...';
      document.getElementById('sendBtn').disabled = false;
    }

    document.getElementById('messageInput').addEventListener('input', (e) => {
      document.getElementById('sendBtn').disabled = !e.target.value.trim() && !selectedImage && !selectedFile;
      
      clearTimeout(typingTimeout);
      if (currentChannel) {
        socket.emit('typing', { channelId: currentChannel.id });
        typingTimeout = setTimeout(() => {
          socket.emit('stop_typing', { channelId: currentChannel.id });
        }, 2000);
      }
    });

    document.getElementById('messageInput').addEventListener('keypress', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    function scrollToBottom() {
      const container = document.getElementById('messages');
      container.scrollTop = container.scrollHeight;
    }

    function showTypingIndicator(username) {
      const container = document.getElementById('messages');
      let indicator = container.querySelector('.typing-indicator');
      if (!indicator) {
        indicator = document.createElement('div');
        indicator.className = 'typing-indicator';
        container.appendChild(indicator);
      }
      indicator.innerHTML = `${escapeHtml(username)} is typing <span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span>`;
      scrollToBottom();
    }

    function hideTypingIndicator() {
      const indicator = document.querySelector('.typing-indicator');
      if (indicator) indicator.remove();
    }

    function toggleMemberList() {
      const memberList = document.getElementById('memberList');
      memberList.style.display = memberList.style.display === 'none' ? 'flex' : 'none';
    }

    function updateMemberList() {
      if (!currentServer) return;
      const container = document.getElementById('memberListContent');
      const members = allUsers.filter(u => currentServer.members.includes(u.userId));
      container.innerHTML = members.map(u => `
        <div class="member-item">
          <span class="status-badge status-${u.status || 'offline'}"></span>
          <div class="member-avatar">${u.username.charAt(0).toUpperCase()}</div>
          <span>${escapeHtml(u.username)}</span>
        </div>
      `).join('');
    }

    function viewImage(src) {
      window.open(src, '_blank');
    }

    function escapeHtml(text) {
      const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
      return text.replace(/[&<>"']/g, m => map[m]);
    }

    window.addEventListener('load', () => {
      document.getElementById('loginEmail').focus();
    });
  </script>
</body>
</html>
